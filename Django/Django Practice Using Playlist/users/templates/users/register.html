{% extends 'blog/base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit">Sign Up</button>
        <label>Already have an accout: </label>
        <a href="{% url 'login' %}">Login</a>
    </form>
</div>
{% endblock content %}
